<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>mobius-user · admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --border: #1f2a44;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --error: #f87171;
      --success: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    header .who { margin-left: auto; color: var(--muted); font-size: 12px; }
    header button.signout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    header button.signout:hover { color: var(--text); border-color: var(--text); }
    main { padding: 16px 20px; }

    .login {
      max-width: 360px;
      margin: 80px auto;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .login h2 { margin: 0 0 16px; font-size: 16px; }
    .login input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
    }
    .login button {
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .login button:hover { background: var(--accent-hover); }
    .login .err { color: var(--error); margin-top: 8px; font-size: 12px; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .toolbar input[type=search] {
      flex: 1;
      max-width: 360px;
      padding: 6px 10px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
    }
    .toolbar .count { color: var(--muted); font-size: 12px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    tbody tr.row { cursor: pointer; }
    tbody tr.row:hover { background: rgba(255,255,255,0.03); }
    tbody tr.detail { background: rgba(96,165,250,0.04); }
    tbody tr.detail td { padding: 16px 20px; }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: rgba(96,165,250,0.15);
      color: var(--accent);
    }
    .badge.ok { background: rgba(74,222,128,0.15); color: var(--success); }
    .badge.muted { background: rgba(255,255,255,0.06); color: var(--muted); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .detail-block h3 {
      margin: 0 0 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .detail-block dl {
      margin: 0;
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 4px 12px;
      font-size: 12px;
    }
    .detail-block dt { color: var(--muted); }
    .detail-block dd { margin: 0; word-break: break-word; }

    .prompt {
      grid-column: 1 / -1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text);
    }
    .prompt-head {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .prompt-head h3 { margin: 0; }
    .prompt-head span { color: var(--muted); font-size: 11px; }

    .empty { padding: 32px; text-align: center; color: var(--muted); }
    .err { color: var(--error); padding: 12px; }
  </style>
</head>
<body>

<div id="login-screen" class="login" style="display:none">
  <h2>mobius-user · admin</h2>
  <input id="li-email" type="email" placeholder="email" autocomplete="email" />
  <input id="li-password" type="password" placeholder="password" autocomplete="current-password" />
  <button id="li-go">Sign in</button>
  <div id="li-err" class="err"></div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>mobius-user · admin</h1>
    <span class="who" id="who"></span>
    <button class="signout" id="signout">Sign out</button>
  </header>
  <main>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search email or name…" />
      <span class="count" id="count"></span>
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
(() => {
  const TOKEN_KEY = "mobius.user.admin.token";
  const apiBase = "/api/v1";

  const $ = (id) => document.getElementById(id);
  const fmtRel = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    const ms = Date.now() - d.getTime();
    const m = Math.round(ms / 60000);
    if (m < 1) return "just now";
    if (m < 60) return `${m}m ago`;
    const h = Math.round(m / 60);
    if (h < 24) return `${h}h ago`;
    const days = Math.round(h / 24);
    if (days < 30) return `${days}d ago`;
    return d.toISOString().slice(0, 10);
  };
  const escapeHtml = (s) => {
    const div = document.createElement("div");
    div.textContent = s == null ? "" : String(s);
    return div.innerHTML;
  };

  let state = {
    token: localStorage.getItem(TOKEN_KEY),
    me: null,
    users: [],
    expandedId: null,
    detailCache: new Map(),
  };

  async function api(path, opts = {}) {
    const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
    if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
    const res = await fetch(apiBase + path, { ...opts, headers });
    if (res.status === 401) {
      logout();
      throw new Error("Session expired");
    }
    if (res.status === 403) {
      logout();
      throw new Error("Not in admin allowlist");
    }
    if (!res.ok) {
      const body = await res.text().catch(() => "");
      throw new Error(`${res.status}: ${body || res.statusText}`);
    }
    return res.json();
  }

  function logout() {
    state.token = null;
    state.me = null;
    localStorage.removeItem(TOKEN_KEY);
    showLogin();
  }

  function showLogin() {
    $("login-screen").style.display = "block";
    $("app").style.display = "none";
  }
  function showApp() {
    $("login-screen").style.display = "none";
    $("app").style.display = "block";
  }

  async function doLogin() {
    const email = $("li-email").value.trim();
    const password = $("li-password").value;
    $("li-err").textContent = "";
    if (!email || !password) {
      $("li-err").textContent = "Email and password required";
      return;
    }
    try {
      const r = await fetch(apiBase + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        $("li-err").textContent = data.detail || data.error || "Login failed";
        return;
      }
      state.token = data.access_token;
      state.me = data.user;
      localStorage.setItem(TOKEN_KEY, state.token);
      // Probe an admin endpoint to confirm allowlist before showing app.
      await api("/admin/users?limit=1");
      showApp();
      $("who").textContent = data.user?.email || "";
      load();
    } catch (e) {
      $("li-err").textContent = e.message || "Login failed";
    }
  }

  async function load(query) {
    const url = "/admin/users?" + new URLSearchParams({ limit: 200, ...(query ? { q: query } : {}) });
    let res;
    try {
      res = await api(url);
    } catch (e) {
      $("content").innerHTML = `<div class="err">${escapeHtml(e.message)}</div>`;
      return;
    }
    state.users = res.users || [];
    $("count").textContent = `${res.users.length} of ${res.total} user${res.total === 1 ? "" : "s"}`;
    render();
  }

  function render() {
    const rows = state.users;
    if (!rows.length) {
      $("content").innerHTML = `<div class="empty">No users.</div>`;
      return;
    }
    let html = `
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Auth</th>
            <th>Profile</th>
            <th>Onboarded</th>
            <th>Last login</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
    `;
    for (const u of rows) {
      const expanded = state.expandedId === u.user_id;
      const name = u.preferred_name || u.first_name || u.display_name || "—";
      const auth = (u.auth_providers || []).map(p => `<span class="badge muted">${escapeHtml(p)}</span>`).join(" ") || `<span class="badge muted">—</span>`;
      const profile = u.has_profile
        ? `<span class="badge ok">v${u.profile_version || "?"}</span>`
        : `<span class="badge muted">none</span>`;
      const onboarded = u.is_onboarded ? `<span class="badge ok">yes</span>` : `<span class="badge muted">no</span>`;
      html += `
        <tr class="row" data-id="${u.user_id}">
          <td>${escapeHtml(u.email || "—")}</td>
          <td>${escapeHtml(name)}</td>
          <td>${auth}</td>
          <td>${profile}</td>
          <td>${onboarded}</td>
          <td>${fmtRel(u.last_login_at)}</td>
          <td>${fmtRel(u.created_at)}</td>
        </tr>
      `;
      if (expanded) {
        const detail = state.detailCache.get(u.user_id);
        html += `<tr class="detail"><td colspan="7">${detail ? renderDetail(detail) : '<div class="empty">Loading…</div>'}</td></tr>`;
      }
    }
    html += "</tbody></table>";
    $("content").innerHTML = html;

    document.querySelectorAll("tr.row").forEach((tr) => {
      tr.addEventListener("click", () => toggle(tr.dataset.id));
    });
  }

  function renderDetail(d) {
    const u = d.user;
    const prefs = u.preference || {};
    const profile = u.profile || {};
    const tasks = (profile.tasks || []).map(t => escapeHtml(t.label || t.code)).join(", ") || "—";
    const providers = (u.auth_providers || []).map(p => `${escapeHtml(p.provider)} (${escapeHtml(p.email || "")})`).join(", ") || "—";
    return `
      <div class="detail-grid">
        <div class="detail-block">
          <h3>Identity</h3>
          <dl>
            <dt>user_id</dt><dd><code>${escapeHtml(u.user_id)}</code></dd>
            <dt>tenant_id</dt><dd><code>${escapeHtml(u.tenant_id)}</code></dd>
            <dt>email</dt><dd>${escapeHtml(u.email || "—")}</dd>
            <dt>first_name</dt><dd>${escapeHtml(u.first_name || "—")}</dd>
            <dt>preferred_name</dt><dd>${escapeHtml(u.preferred_name || "—")}</dd>
            <dt>display_name</dt><dd>${escapeHtml(u.display_name || "—")}</dd>
            <dt>timezone</dt><dd>${escapeHtml(u.timezone || "—")}</dd>
            <dt>auth providers</dt><dd>${providers}</dd>
            <dt>active sessions</dt><dd>${u.active_sessions ?? "—"}</dd>
          </dl>
        </div>
        <div class="detail-block">
          <h3>Preferences</h3>
          <dl>
            <dt>onboarded</dt><dd>${u.is_onboarded ? `yes (${fmtRel(u.onboarding_completed_at)})` : "no"}</dd>
            <dt>tone</dt><dd>${escapeHtml(prefs.tone || "—")}</dd>
            <dt>experience</dt><dd>${escapeHtml(prefs.ai_experience_level || "—")}</dd>
            <dt>greeting</dt><dd>${prefs.greeting_enabled === false ? "off" : "on"}</dd>
            <dt>routine autonomy</dt><dd>${escapeHtml(prefs.autonomy_routine_tasks || "—")}</dd>
            <dt>sensitive autonomy</dt><dd>${escapeHtml(prefs.autonomy_sensitive_tasks || "—")}</dd>
            <dt>tasks</dt><dd>${tasks}</dd>
          </dl>
        </div>
        <div class="prompt-head">
          <h3>Rendered prompt</h3>
          <span>v${profile.version ?? "—"} · generated ${fmtRel(profile.generated_at)}</span>
        </div>
        <div class="prompt">${escapeHtml(profile.rendered_prompt || "(no profile yet — user has not onboarded)")}</div>
      </div>
    `;
  }

  async function toggle(id) {
    state.expandedId = state.expandedId === id ? null : id;
    render();
    if (state.expandedId === id && !state.detailCache.has(id)) {
      try {
        const d = await api(`/admin/users/${id}`);
        state.detailCache.set(id, d);
        render();
      } catch (e) {
        $("content").innerHTML = `<div class="err">${escapeHtml(e.message)}</div>`;
      }
    }
  }

  // Bootstrap.
  $("li-go").addEventListener("click", doLogin);
  $("li-password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });
  $("signout").addEventListener("click", () => logout());

  let searchT;
  $("search").addEventListener("input", (e) => {
    clearTimeout(searchT);
    searchT = setTimeout(() => load(e.target.value.trim() || null), 200);
  });

  if (state.token) {
    api("/auth/me").then((r) => {
      state.me = r.user;
      $("who").textContent = r.user?.email || "";
      showApp();
      load();
    }).catch(() => {
      logout();
    });
  } else {
    showLogin();
  }
})();
</script>

</body>
</html>
