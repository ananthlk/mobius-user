# Cloud Build config for mobius-user.
#
# Self-contained service — Dockerfile is at the repo root and the build
# context is the repo root. Unlike mobius-chat (which vendors siblings),
# mobius-user has no sibling repos to copy, so we use the simple
# `--tag` shortcut equivalent expressed as an explicit docker build step.
#
# Invoked by scripts/deploy.sh:
#   gcloud builds submit . \
#     --config=deploy/cloudbuild.yaml \
#     --substitutions=_IMAGE=<tag>,_IMAGE_BASE=<image-base>

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Dockerfile
      - --tag=${_IMAGE}
      - --cache-from=${_IMAGE_BASE}:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}"]

  # Tag :latest so the next build's --cache-from has something to pull.
  - name: gcr.io/cloud-builders/docker
    args:
      - tag
      - ${_IMAGE}
      - ${_IMAGE_BASE}:latest
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE_BASE}:latest"]

images:
  - ${_IMAGE}
  - ${_IMAGE_BASE}:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
